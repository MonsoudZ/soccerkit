name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    # macos-15 ships Xcode 16, which can read the objectVersion 77 project
    # format that the current XcodeGen emits.
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build and run tests
        run: |
          # The exact simulator device names on the macOS image drift over time,
          # so don't pin "iPhone 16" — pick whatever iOS simulator the runner
          # actually has and target it by UDID.
          DEVICE_ID=$(xcrun simctl list devices available -j \
            | python3 -c "import json,sys; d=json.load(sys.stdin)['devices']; ids=[x['udid'] for rt,ds in d.items() if 'iOS' in rt for x in ds if x.get('isAvailable') and 'iPhone' in x['name']]; print(ids[-1] if ids else '')")
          if [ -z "$DEVICE_ID" ]; then
            echo "No iOS simulator available on this runner:"; xcrun simctl list devices; exit 1
          fi
          echo "Using simulator UDID: $DEVICE_ID"
          xcodebuild test \
            -project SoccerCoachKit.xcodeproj \
            -scheme SoccerCoachKit \
            -destination "id=$DEVICE_ID" \
            CODE_SIGNING_ALLOWED=NO

name: SoccerCoachKit
options:
  bundleIdPrefix: com.monsoudzanaty
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: CNK57345QT
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
schemes:
  SoccerCoachKit:
    build:
      targets:
        SoccerCoachKit: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SoccerCoachKitTests
        - SoccerCoachKitUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
targets:
  SoccerCoachKit:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SoccerCoachKit
    dependencies:
      - target: GameWidget
    entitlements:
      path: SoccerCoachKit/SoccerCoachKit.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.monsoudzanaty.SoccerCoachKit
        com.apple.developer.applesignin:
          - Default
        com.apple.developer.icloud-services:
          - CloudKit
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.monsoudzanaty.SoccerCoachKit
        aps-environment: development
    # BACKEND_BASE_URL defaults to empty (app stays unconfigured → CloudKit, and
    # no dev host ever ships). Config/Local.xcconfig (gitignored) overrides it for
    # local dev, per-SDK. See Config/Local.xcconfig.example.
    configFiles:
      Debug: Config/Backend.xcconfig
      Release: Config/Backend.xcconfig
    info:
      path: SoccerCoachKit/Info.plist
      properties:
        # CloudKit (CKSyncEngine) needs the remote-notification background mode
        # to receive silent pushes for sync. Other Info.plist keys are still
        # merged in from the INFOPLIST_KEY_* build settings below.
        UIBackgroundModes:
          - remote-notification
        # Go backend base URL. The app appends /v1/... itself, so this is the
        # host (plus main's /api prefix). Resolved per-SDK from the
        # BACKEND_BASE_URL build setting below (see the target `settings`), so the
        # simulator and a physical device each get the right host automatically —
        # no hand-editing this value per environment.
        BackendBaseURL: "$(BACKEND_BASE_URL)"
        # Allow cleartext HTTP to LAN/.local hosts (dev backend over the local
        # network). Covers .local names and private-range IP literals.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.monsoudzanaty.SoccerCoachKit
        PRODUCT_NAME: "$(TARGET_NAME)"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_NSSupportsLiveActivities: "YES"
        ENABLE_TESTABILITY: "YES"
        ENABLE_PREVIEWS: "YES"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: "NO"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        DEVELOPMENT_ASSET_PATHS: '"SoccerCoachKit/Preview Content"'
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
  SoccerCoachKitTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SoccerCoachKitTests
    dependencies:
      - target: SoccerCoachKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.monsoudzanaty.SoccerCoachKitTests
        GENERATE_INFOPLIST_FILE: "YES"
  SoccerCoachKitUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: SoccerCoachKitUITests
    dependencies:
      - target: SoccerCoachKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.monsoudzanaty.SoccerCoachKitUITests
        GENERATE_INFOPLIST_FILE: "YES"
  GameWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.1"
    sources:
      - path: GameWidget
      # Shared with the app so both sides agree on the Live Activity type and
      # the Home Screen widget's model/view. The controller + intent are shared
      # so the interactive Live Activity buttons (which run in the app process)
      # can be built into the widget.
      - path: SoccerCoachKit/GameActivity/GameActivityAttributes.swift
      - path: SoccerCoachKit/GameActivity/GameActivityController.swift
      - path: SoccerCoachKit/GameActivity/ScoreIntent.swift
      - path: SoccerCoachKit/WidgetShared
    entitlements:
      path: GameWidget/GameWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.monsoudzanaty.SoccerCoachKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.monsoudzanaty.SoccerCoachKit.GameWidget
        PRODUCT_NAME: "$(TARGET_NAME)"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_FILE: GameWidget/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: "Game Day"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        SKIP_INSTALL: "YES"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: "NO"
        SWIFT_EMIT_LOC_STRINGS: "YES"

name: SoccerCoachKit
options:
  bundleIdPrefix: com.monsoudzanaty
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: CNK57345QT
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
schemes:
  SoccerCoachKit:
    build:
      targets:
        SoccerCoachKit: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SoccerCoachKitTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
targets:
  SoccerCoachKit:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: SoccerCoachKit
    dependencies:
      - target: GameWidget
    entitlements:
      path: SoccerCoachKit/SoccerCoachKit.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.monsoudzanaty.SoccerCoachKit
        com.apple.developer.applesignin:
          - Default
        com.apple.developer.ubiquity-kvstore-identifier: "$(TeamIdentifierPrefix)$(CFBundleIdentifier)"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.monsoudzanaty.SoccerCoachKit
        PRODUCT_NAME: "$(TARGET_NAME)"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_NSSupportsLiveActivities: "YES"
        ENABLE_TESTABILITY: "YES"
        ENABLE_PREVIEWS: "YES"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: "NO"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        DEVELOPMENT_ASSET_PATHS: '"SoccerCoachKit/Preview Content"'
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: "YES"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
  SoccerCoachKitTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: SoccerCoachKitTests
    dependencies:
      - target: SoccerCoachKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.monsoudzanaty.SoccerCoachKitTests
        GENERATE_INFOPLIST_FILE: "YES"
  GameWidget:
    type: app-extension
    platform: iOS
    deploymentTarget: "16.1"
    sources:
      - path: GameWidget
      # Shared with the app so both sides agree on the Live Activity type and
      # the Home Screen widget's model/view. The controller + intent are shared
      # so the interactive Live Activity buttons (which run in the app process)
      # can be built into the widget.
      - path: SoccerCoachKit/GameActivity/GameActivityAttributes.swift
      - path: SoccerCoachKit/GameActivity/GameActivityController.swift
      - path: SoccerCoachKit/GameActivity/ScoreIntent.swift
      - path: SoccerCoachKit/WidgetShared
    entitlements:
      path: GameWidget/GameWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.monsoudzanaty.SoccerCoachKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.monsoudzanaty.SoccerCoachKit.GameWidget
        PRODUCT_NAME: "$(TARGET_NAME)"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_FILE: GameWidget/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: "Game Day"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        SKIP_INSTALL: "YES"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTED_PLATFORMS: "iphoneos iphonesimulator"
        SUPPORTS_MACCATALYST: "NO"
        SWIFT_EMIT_LOC_STRINGS: "YES"
